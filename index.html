<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MSWIL JSON DEBUG</title>

<style>
body { font-family: Arial; padding: 20px; }

.header {
  display: flex;
  align-items: center;
  gap: 15px;
}

.company-name {
  font-size: 30px;
  font-weight: bold;
}

.company-logo {
  height: 60px;   /* BIG & CLEAR */
}

table {
  border-collapse: collapse;
  width: 100%;
  margin-top: 20px;
}

th, td {
  border: 1px solid #555;
  padding: 6px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <span class="company-name">Motherson Wiring India Limited</span>
  <img src="Logo.png" class="company-logo">
</div>

<h3>JSON Load Proof Page</h3>

<p id="status">Loading products.json…</p>

<table>
<thead>
<tr>
  <th>Material No</th>
  <th>Jig Code</th>
  <th>Description</th>
  <th>Price</th>
</tr>
</thead>
<tbody id="rows"></tbody>
</table>

<script>
fetch("products.json")
  .then(r => r.text())
  .then(t => {
    t = t.replace(/^\uFEFF/, "");
    const data = JSON.parse(t);

    document.getElementById("status").innerText =
      "✅ Records loaded: " + data.length;

    const rows = document.getElementById("rows");

    data.slice(0, 20).forEach(p => {
      rows.innerHTML += `
        <tr>
          <td>${p["Material No"]}</td>
          <td>${p["Jig Code"]}</td>
          <td>${p["Description"]}</td>
          <td>${p["Price"]}</td>
        </tr>
      `;
    });
  })
  .catch(err => {
    document.getElementById("status").innerText =
      "❌ JSON LOAD ERROR";
    console.error(err);
  });
</script>

</body>
</html>
